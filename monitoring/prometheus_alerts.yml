groups:
  - name: system_alerts
    interval: 30s
    rules:
      # CPU Alerts
      - alert: HighCPUUsage
        expr: (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 5m
        labels:
          severity: warning
          service: host-metrics
        annotations:
          summary: "High CPU usage detected on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanize }}% on {{ $labels.instance }}"

      - alert: CriticalCPUUsage
        expr: (100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 95
        for: 2m
        labels:
          severity: critical
          service: host-metrics
        annotations:
          summary: "Critical CPU usage detected on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | humanize }}% on {{ $labels.instance }}"

      # Memory Alerts
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: host-metrics
        annotations:
          summary: "High memory usage detected on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanize }}% on {{ $labels.instance }}"

      - alert: CriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 2m
        labels:
          severity: critical
          service: host-metrics
        annotations:
          summary: "Critical memory usage detected on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | humanize }}% on {{ $labels.instance }}"

      # Disk Alerts
      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: host-metrics
        annotations:
          summary: "High disk usage on {{ $labels.instance }} - {{ $labels.mountpoint }}"
          description: "Disk usage is {{ $value | humanize }}%"

      - alert: CriticalDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs"})) * 100 > 95
        for: 2m
        labels:
          severity: critical
          service: host-metrics
        annotations:
          summary: "Critical disk usage on {{ $labels.instance }} - {{ $labels.mountpoint }}"
          description: "Disk usage is {{ $value | humanize }}%"

      # System Load Alerts
      - alert: HighSystemLoad
        expr: node_load1 > (count by (instance) (node_cpu_seconds_total{mode="system"}) * 0.8)
        for: 5m
        labels:
          severity: warning
          service: host-metrics
        annotations:
          summary: "High system load on {{ $labels.instance }}"
          description: "Load average is {{ $value | humanize }}"

      # Docker Container Alerts
      - alert: ContainerDown
        expr: up{job=~"backend|postgres"} == 0
        for: 2m
        labels:
          severity: critical
          service: docker
        annotations:
          summary: "Container is down: {{ $labels.job }}"
          description: "Container {{ $labels.job }} on {{ $labels.instance }} has been down for 2 minutes"

      # Node Exporter Down Alert
      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 2m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: "Node Exporter is down on {{ $labels.instance }}"
          description: "Node Exporter has been unreachable for 2 minutes"
