global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'tasks-app-monitor'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - '/etc/prometheus/alerts.yml'

scrape_configs:
  # Node Exporter - Host system metrics (CPU, RAM, disk, network)
  - job_name: 'node-exporter'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'gcp-vm'
          service: 'host-metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # FastAPI Backend Metrics (if you add prometheus middleware)
  - job_name: 'backend'
    scrape_interval: 15s
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'fastapi-app'
    metrics_path: '/metrics'

  # PostgreSQL Metrics (optional - requires postgres_exporter)
  - job_name: 'postgres'
    scrape_interval: 15s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres-db'
