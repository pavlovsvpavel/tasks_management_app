# After SSL
server {
    listen 80;
    server_name tasks-app.win;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://tasks-app.win$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name tasks-app.win;

    root  /usr/share/nginx/html;

    ssl_certificate /etc/nginx/ssl/live/tasks-app.win/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/tasks-app.win/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';

    http2 on;
    client_max_body_size 10M;
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    if ($is_truly_a_bad_bot) {
        return 444;
    }

    if ($is_blocked_file) {
        return 444;
    }

    # Monitoring location - NO rate limiting
    location /monitoring/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # Let Grafana handle redirects with SERVE_FROM_SUB_PATH
        proxy_redirect off;
        
        # WebSocket support for Grafana
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api {
        limit_req zone=limit_per_ip burst=10 nodelay;
        if ($is_valid_client = 0) {
                    return 403;
        }
        proxy_pass http://web_server;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location /api/auth/google/ {
        # This location is PUBLIC - no NGINX_APP_KEY check.
        proxy_pass http://web_server;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location ~ ^/admin-portal(/.*)?$ {
        limit_req zone=limit_per_ip burst=10 nodelay;
        proxy_pass http://web_server;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location = / {
        if ($request_method = POST) {
            return 444;
        }
        return 444;
    }
}